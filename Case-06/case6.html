<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="keywords" content="web, html, css, javascript, js, java, python">
    <meta name="description" content="IJSE Web CSS Tute 01">
    <meta name="author" content="IJSE">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CSS Tute Case 01</title>
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">

    <link rel="stylesheet" href="../assets/lib/normalize.css">
    <link rel="stylesheet" href="https://www.hxstrive.com/cdn/libs/font-awesome/7.0.1/css/all.min.css">
    <style>
        main{
            width: 100vw;
            height: 100vh;
            background-image: url("assets/Car_Animation_Img/sky.jpg");
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            position: relative;
        }

        main > section > section:nth-child(1){
            position: absolute;
            width: 100%;
            height: Calc(100vh / 3);
            background-image: url("assets/Car_Animation_Img/city.png");
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            margin-top: 251px;
        }

        main > section > section:nth-child(2){
            width: 100%;
            height: Calc(100vh / 3);
            background-image: url("assets/Car_Animation_Img/road.jpg");
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            position: absolute;
            bottom: 0;
        }

        main > section{
            position: relative;
            width: 100%;
        }
    </style>
</head>
<body>
    <main>
        <section>
            <section></section>
            <section></section>
        </section>
    </main>
</body>
</html>
