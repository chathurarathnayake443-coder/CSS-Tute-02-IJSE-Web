<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="keywords" content="web, html, css, javascript, js, java, python">
    <meta name="description" content="IJSE Web CSS Tute 01">
    <meta name="author" content="IJSE">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CSS Tute Case 01</title>
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">

    <link rel="stylesheet" href="../assets/lib/normalize.css">
    <link rel="stylesheet" href="https://www.hxstrive.com/cdn/libs/font-awesome/7.0.1/css/all.min.css">
    <style>
    div{
        width: 100px;
        height: 100px;
        border-radius: 50%;
        border: 4px solid palevioletred;
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        margin: auto;
        animation: animation 1s linear infinite;
    }

    @keyframes animation {
        0%{
            width: 100px;
            height:100px;
            border: 4px solid palevioletred;
        }

        25%{
            width: 200px;
            height:200px;
            border: 3px solid palevioletred;
        }

        50%{
            width: 300px;
            height:300px;
            border: 2px solid palevioletred;
        }

        75%{
            width: 400px;
            height:400px;
            border: 1px solid palevioletred;
        }

        100%{
            width: 500px;
            height:500px;
            border: 0 solid palevioletred;
        }
    }
    </style>
</head>
<body>
    <div></div>
</body>
</html>
